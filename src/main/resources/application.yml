spring:
  application:
    name: t-reserve-engine

  # ═══ PostgreSQL ═══
  datasource:
    url: jdbc:postgresql://localhost:5432/treserve
    username: treserve
    password: treserve_dev
    hikari:
      maximum-pool-size: 20

  # ═══ JPA ═══
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ═══ Flyway ═══
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ═══ Redis ═══
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16

  # ═══ RabbitMQ ═══
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ═══ Virtual Threads (Java 21) ═══
  threads:
    virtual:
      enabled: true

# ═══ App Settings ═══
app:
  jwt:
    secret: ${JWT_SECRET:t-reserve-super-secret-key-change-in-prod-256-bits-minimum}
    expiration-ms: 86400000  # 24 hours
  booking:
    lock-duration-minutes: 10

# ═══ Swagger ═══
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ═══ Actuator ═══
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ═══ Logging ═══
logging:
  level:
    com.treserve: DEBUG
    org.springframework.security: DEBUG

# ═══ Error details ═══
server:
  error:
    include-message: always
    include-stacktrace: on_param
