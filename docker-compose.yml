services:
  # ═══ Spring Boot App ═══
  app:
    build: .
    container_name: treserve-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/treserve
      SPRING_DATASOURCE_USERNAME: treserve
      SPRING_DATASOURCE_PASSWORD: treserve_dev
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ═══ PostgreSQL ═══
  postgres:
    image: postgres:16-alpine
    container_name: treserve-postgres
    environment:
      POSTGRES_DB: treserve
      POSTGRES_USER: treserve
      POSTGRES_PASSWORD: treserve_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treserve"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══ Redis ═══
  redis:
    image: redis:7-alpine
    container_name: treserve-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══ RabbitMQ ═══
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: treserve-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pg_data:
