<article class="event-card" (click)="openEvent()">
  <div class="event-poster" [style.background-image]="'url(' + event.imageUrl + ')'"></div>
  <div class="event-copy">
    <div class="event-line">
      <span class="pill">{{ event.category }}</span>
      <span class="meta">{{ event.ageRating }}</span>
    </div>
    <h3>{{ event.title }}</h3>
    <p>{{ event.tagline }}</p>
    <span class="meta">{{ event.venue }}</span>
  </div>
</article>
